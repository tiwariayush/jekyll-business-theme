baseurl: ''
url: "https://cartesiantrees.com"
permalink: pretty
title: 'Cartesian Trees'
description: "Cartesian Trees is a JEI-certified AI solution partner in Paris. We build LLM-powered applications, agentic systems, RAG pipelines, and Bayesian inference engines — plus the Python, Django, React, and Next.js engineering to ship them into production."
author:
  name: "Ayush Tiwari"
  url: "https://cartesiantrees.com"
lang: "en"

logo_info:
  mobile: "images/logo/logo-main.png"
  mobile_height: "32px"
  mobile_width: "32px"
  desktop: "images/logo/logo-main.png"
  desktop_height: "60px"
  desktop_width: "300px"

logo: "images/logo/logo-main.png"

home:
  limit_services: 6

collections:
  services:
    output: true
    sort_by: weight
  team:
    output: true

defaults:
  - scope:
      path: ""
      type: "services"
    values:
      layout: "service"
  - scope:
      path: ""
      type: "team"
    values:
      layout: "team"

sass:
  style: compressed # possible values: nested expanded compact compressed

plugins:
  - jekyll-environment-variables
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - LICENSE.md
  - LICENSE
  - README.md

