---
layout: default
bodyClass: "page-basic"
---

<div class="container pb-6 pt-6 pt-md-10 pb-md-10">
    <div class="row justify-content-start">
        <div class="col-12 col-md-8">
            <div class="service service-single">
                <h1 class="title">{{page.title}}</h1>
                <div class="content" id="page-content">{{content}}</div>
            </div>
        </div>
        <div class="col-md-3 offset-md-1 d-none d-md-block">
            <nav class="page-toc" id="page-toc">
                <div class="page-toc-title">On this page</div>
                <ul id="toc-list"></ul>
                <div class="page-toc-progress">
                    <div class="page-toc-progress-bar" id="toc-progress-bar"></div>
                </div>
            </nav>
        </div>
    </div>
</div>

<script>
(function() {
    var content = document.getElementById('page-content');
    var tocList = document.getElementById('toc-list');
    var progressBar = document.getElementById('toc-progress-bar');
    var toc = document.getElementById('page-toc');

    if (!content || !tocList) return;

    var headings = content.querySelectorAll('h2');
    if (headings.length < 2) {
        if (toc) toc.style.display = 'none';
        return;
    }

    headings.forEach(function(h, i) {
        if (!h.id) h.id = 'section-' + i;
        var li = document.createElement('li');
        var a = document.createElement('a');
        a.href = '#' + h.id;
        a.textContent = h.textContent;
        a.setAttribute('data-index', i);
        li.appendChild(a);
        tocList.appendChild(li);
    });

    function updateToc() {
        var scrollPos = window.scrollY + 120;
        var activeIndex = 0;
        var docHeight = document.documentElement.scrollHeight - window.innerHeight;
        var scrollPercent = Math.min((window.scrollY / docHeight) * 100, 100);
        progressBar.style.height = scrollPercent + '%';

        headings.forEach(function(h, i) {
            if (h.offsetTop <= scrollPos) activeIndex = i;
        });

        tocList.querySelectorAll('a').forEach(function(a, i) {
            if (i === activeIndex) {
                a.classList.add('active');
            } else {
                a.classList.remove('active');
            }
        });
    }

    window.addEventListener('scroll', updateToc);
    updateToc();
})();
</script>
